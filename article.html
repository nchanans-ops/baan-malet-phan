<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta id="meta-desc" name="description" content="">
<title id="page-title">บทความ — บ้านเมล็ดพันธุ์</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root{
  --green-900:#14532d;--green-700:#15803d;--green-500:#22c55e;
  --green-100:#dcfce7;--green-50:#f0fdf4;
  --gray-900:#111827;--gray-700:#374151;--gray-500:#6b7280;
  --gray-300:#d1d5db;--gray-100:#f3f4f6;--gray-50:#f9fafb;
  --font:'Anuphan',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--gray-50);color:var(--gray-900);line-height:1.7;}

/* NAV */
.nav{background:var(--green-900);height:54px;display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:9px;text-decoration:none;}
.nav-logo-box{width:30px;height:30px;background:var(--green-700);border-radius:9px;display:flex;align-items:center;justify-content:center;}
.nav-logo-name{font-size:14px;font-weight:800;color:white;}
.nav-back{margin-left:auto;display:flex;align-items:center;gap:5px;color:rgba(255,255,255,0.7);font-size:12px;text-decoration:none;background:rgba(255,255,255,0.1);padding:6px 12px;border-radius:20px;cursor:pointer;border:none;font-family:var(--font);}
.nav-back:hover{background:rgba(255,255,255,0.18);color:white;}

/* HERO */
.article-hero{background:var(--green-900);padding:28px 0 0;}
.article-hero-inner{max-width:820px;margin:0 auto;padding:0 24px;}
.article-cat{display:inline-flex;padding:4px 12px;border-radius:20px;background:rgba(34,197,94,0.2);color:#4ade80;font-size:11px;font-weight:700;margin-bottom:12px;}
.article-hero h1{font-size:clamp(1.4rem,3.5vw,2.1rem);font-weight:800;color:white;line-height:1.3;margin-bottom:14px;}
.article-meta{display:flex;align-items:center;gap:14px;font-size:12px;color:rgba(255,255,255,0.5);padding-bottom:28px;flex-wrap:wrap;}
.article-img-wrap{max-width:820px;margin:0 auto;}
.article-img{width:100%;max-height:420px;object-fit:cover;display:block;}

/* BODY */
.article-body{max-width:820px;margin:0 auto;padding:36px 24px 80px;}
.article-content h2{font-size:1.25rem;font-weight:800;color:var(--gray-900);margin:28px 0 10px;padding-bottom:8px;border-bottom:2px solid var(--green-100);}
.article-content p{font-size:15px;color:var(--gray-700);line-height:1.9;margin-bottom:14px;}
.article-content ul,.article-content ol{padding-left:22px;margin-bottom:16px;}
.article-content li{font-size:15px;color:var(--gray-700);line-height:1.85;margin-bottom:6px;}
.article-content strong{color:var(--gray-900);font-weight:700;}
.article-content h3{font-size:1.05rem;font-weight:800;color:var(--gray-900);margin:20px 0 8px;}

/* SHARE */
.article-share{display:flex;align-items:center;gap:10px;margin-top:36px;padding-top:22px;border-top:1px solid var(--gray-100);flex-wrap:wrap;}
.share-label{font-size:13px;font-weight:700;color:var(--gray-500);}
.share-btn{padding:7px 16px;border-radius:20px;border:1.5px solid var(--gray-200);background:white;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);color:var(--gray-700);transition:all .15s;}
.share-btn:hover{border-color:var(--green-700);color:var(--green-700);}

/* RELATED */
.related{background:white;border-top:1px solid var(--gray-100);padding:32px 24px;max-width:820px;margin:0 auto;}
.related-title{font-size:14px;font-weight:800;color:var(--gray-900);margin-bottom:16px;}
.related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}
.related-card{border-radius:12px;border:1px solid var(--gray-100);overflow:hidden;text-decoration:none;color:inherit;display:block;background:white;}
.related-card:hover{border-color:var(--green-200);}
.related-card-img{height:110px;background:var(--green-50);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.related-card-img img{width:100%;height:100%;object-fit:cover;}
.related-card-body{padding:12px;}
.related-card-cat{font-size:10px;font-weight:700;color:var(--green-700);margin-bottom:4px;}
.related-card-title{font-size:13px;font-weight:700;color:var(--gray-900);line-height:1.4;}

/* LOADING */
.loading{text-align:center;padding:60px 24px;color:var(--gray-400);}
.loading-spinner{width:36px;height:36px;border:3px solid var(--green-100);border-top-color:var(--green-700);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg);}}
.error-wrap{text-align:center;padding:60px 24px;}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <a class="nav-logo" href="index.html">
    <div class="nav-logo-box">
      <svg width="16" height="16" viewBox="0 0 52 52"><polygon points="26,6 48,22 43,22 43,46 9,46 9,22 4,22" fill="none" stroke="white" stroke-width="3" stroke-linejoin="round"/><ellipse cx="26" cy="34" rx="5" ry="8" fill="white"/><line x1="26" y1="26" x2="26" y2="21" stroke="white" stroke-width="2" stroke-linecap="round"/><line x1="26" y1="21" x2="21" y2="16" stroke="white" stroke-width="2" stroke-linecap="round"/><line x1="26" y1="21" x2="31" y2="16" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
    </div>
    <span class="nav-logo-name">บ้านเมล็ดพันธุ์</span>
  </a>
  <button class="nav-back" onclick="history.back()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5m7-7-7 7 7 7"/></svg>
    กลับ
  </button>
</nav>

<!-- CONTENT -->
<div id="content">
  <div class="loading">
    <div class="loading-spinner"></div>
    กำลังโหลดบทความ...
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey:"AIzaSyDPC4EkkU5ah2PwqUDkILrqP3N-tiPEn8k",
  authDomain:"baan-malet-phan.firebaseapp.com",
  projectId:"baan-malet-phan",
  storageBucket:"baan-malet-phan.firebasestorage.app",
  messagingSenderId:"1019868862230",
  appId:"1:1019868862230:web:ba3dfe45cc9fa34e3a6237"
};
if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const catLabel = {general:'ความรู้ทั่วไป',production:'การผลิต',storage:'การเก็บรักษา',quality:'การตรวจสอบคุณภาพ',law:'กฎหมาย'};

function getParam(key){
  return new URLSearchParams(window.location.search).get(key);
}

async function loadArticle(){
  const id = getParam('id');
  if(!id){ showError('ไม่พบบทความ'); return; }
  try {
    const doc = await db.collection('articles').doc(id).get();
    if(!doc.exists){ showError('ไม่พบบทความนี้'); return; }
    const a = { id: doc.id, ...doc.data() };
    renderArticle(a);
    loadRelated(a.cat, a.id);
  } catch(e) {
    showError('โหลดบทความไม่สำเร็จ: ' + e.message);
  }
}

function renderArticle(a){
  // Update SEO meta
  document.getElementById('page-title').textContent = (a.title||'บทความ') + ' — บ้านเมล็ดพันธุ์';
  document.getElementById('meta-desc').content = a.excerpt||'';

  const catText = catLabel[a.cat]||a.cat||'';
  document.getElementById('content').innerHTML = `
    <div class="article-hero">
      <div class="article-hero-inner">
        <span class="article-cat">${catText}</span>
        <h1>${a.title||''}</h1>
        <div class="article-meta">
          <span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-1px;margin-right:3px;"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${a.time||5} นาทีในการอ่าน</span>
          ${a.author ? `<span>โดย ${a.author}</span>` : ''}
        </div>
      </div>
    </div>
    ${a.img ? `<div class="article-img-wrap"><img class="article-img" src="${a.img}" alt="${a.title||''}"></div>` : ''}
    <div class="article-body">
      <div class="article-content">${a.content||''}</div>
      <div class="article-share">
        <span class="share-label">แชร์บทความ:</span>
        <button class="share-btn" onclick="copyLink()">คัดลอกลิงก์</button>
        <button class="share-btn" onclick="shareFB()">Facebook</button>
        <button class="share-btn" onclick="shareLine()">LINE</button>
      </div>
    </div>
    <div id="related-section"></div>
  `;
}

async function loadRelated(cat, currentId){
  try {
    const snap = await db.collection('articles').where('cat','==',cat).limit(4).get();
    const items = snap.docs.map(d=>({id:d.id,...d.data()})).filter(a=>a.id!==currentId).slice(0,3);
    if(!items.length) return;
    const catText = catLabel[cat]||cat||'';
    document.getElementById('related-section').innerHTML = `
      <div class="related" style="max-width:100%;border-top:1px solid #f3f4f6;padding:32px 24px;">
        <div class="related-title" style="max-width:820px;margin:0 auto 16px;">บทความที่เกี่ยวข้อง</div>
        <div class="related-grid" style="max-width:820px;margin:0 auto;">
          ${items.map(a=>`
          <a href="article.html?id=${a.id}" class="related-card">
            <div class="related-card-img">
              ${a.img ? `<img src="${a.img}" alt="${a.title||''}">` : `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#86efac" stroke-width="1.5"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>`}
            </div>
            <div class="related-card-body">
              <div class="related-card-cat">${catLabel[a.cat]||''}</div>
              <div class="related-card-title">${a.title||''}</div>
            </div>
          </a>`).join('')}
        </div>
      </div>
    `;
  } catch(e){}
}

function showError(msg){
  document.getElementById('content').innerHTML = `
    <div class="error-wrap">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="1.5" style="margin:0 auto 12px;display:block;"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      <p style="font-size:15px;color:#6b7280;">${msg}</p>
      <a href="index.html" style="display:inline-block;margin-top:16px;padding:10px 20px;background:#15803d;color:white;border-radius:10px;text-decoration:none;font-weight:700;font-size:14px;">กลับหน้าหลัก</a>
    </div>
  `;
}

function copyLink(){
  navigator.clipboard.writeText(window.location.href).then(()=>alert('คัดลอกลิงก์แล้ว'));
}
function shareFB(){
  window.open('https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(window.location.href));
}
function shareLine(){
  window.open('https://social-plugins.line.me/lineit/share?url='+encodeURIComponent(window.location.href));
}

loadArticle();
</script>
</body>
</html>
